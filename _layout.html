<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><!-- TITLE --></title>
</head>
<body>

  <!-- Landscape background -->
  <div class="landscape-bg">
    <div class="landscape-sky"></div>
    <div class="landscape-cloud landscape-cloud--1"></div>
    <div class="landscape-cloud landscape-cloud--2"></div>
    <div class="landscape-cloud landscape-cloud--3"></div>
    <div class="landscape-cloud landscape-cloud--4"></div>
    <div class="landscape-cloud landscape-cloud--5"></div>
    <div class="landscape-cloud landscape-cloud--6"></div>
    <div class="landscape-cloud landscape-cloud--7"></div>
    <div class="landscape-cloud landscape-cloud--8"></div>
    <div class="landscape-cloud landscape-cloud--9"></div>
    <div class="landscape-cloud landscape-cloud--10"></div>
  </div>

  <!-- Pixel art fountain -->
  <img src="/src/pixel-fountain.gif" class="pixel-sprite pixel-sprite--fountain" alt="" draggable="false">

  <!-- Pixel art rock -->
  <img src="/src/rock2.svg" class="pixel-sprite pixel-sprite--rock" alt="" draggable="false">

  <div class="site-window">
    <div class="site-titlebar">
      <span>nina scibelli, LMT, MLD-c</span>
      <div class="win98-controls">
        <span>_</span>
        <span>□</span>
        <span>×</span>
      </div>
    </div>
    <div class="site-window-body">
      <!-- NAV -->
      <div class="site-content-area">
        <div class="marquee-slot"></div>
        <main>
          <!-- CONTENT -->
        </main>
        <div class="scroll-arrow" aria-hidden="true">&#9660;</div>
      </div>
    </div>
  </div>

  <div class="site-footer">
    <img src="/src/pride.png" alt="Pride flag" class="site-footer-flag">
    <span class="site-footer-copy">copyright 2026</span>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
